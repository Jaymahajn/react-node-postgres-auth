services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mydb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mynetwork
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    container_name: backend
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mynetwork
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env

  frontend:
    container_name: frontend
    build: ./frontend
    depends_on:
      - backend
    networks:
      - mynetwork
    ports:
      - "3000:3000"

networks:
  mynetwork:

volumes:
  postgres-data:
